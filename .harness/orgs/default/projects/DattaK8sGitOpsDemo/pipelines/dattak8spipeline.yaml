pipeline:
  name: datta-k8s-pipeline
  identifier: dattak8spipeline
  projectIdentifier: DattaK8sGitOpsDemo
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: datta-stage-deployment-k8s-simple
        identifier: dattastagedeploymentk8ssimple
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: dattaservicek8s
            failureStrategies: []
          environment:
            environmentRef: pock8s1_32
            deployToAll: false
            infrastructureDefinitions:
              - identifier: dattak8sinfra
          execution:
            steps:
              - step:
                  name: Rollout Deployment
                  identifier: rolloutDeployment
                  type: K8sRollingDeploy
                  timeout: 1m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  name: Rollback Rollout Deployment
                  identifier: rollbackRolloutDeployment
                  type: K8sRollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
